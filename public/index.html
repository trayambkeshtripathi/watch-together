<!DOCTYPE html>
<html>
<head>
    <title>Watch Together</title>
</head>
<body style="text-align:center; font-family:sans-serif;">

<h1>🎬 Watch Together</h1>


<div id="main-section" style="display:none; height:100vh;">

    <div style="display:flex; height:100%;">

        <!-- LEFT: Your video -->
        <div style="width:15%; background:#111;">
            <video id="myVideo" autoplay muted style="width:100%;"></video>
        </div>
	<input type="file" id="videoInput" accept="video/*">
        <!-- CENTER: Movie -->
        <div style="width:70%; text-align:center; background:black;">
            <video id="movie" controls style="width:100%; height:100%;">
                <source src="" id="movieSource">
            </video>

            <br>
            <button onclick="playMovie()">▶</button>
            <button onclick="pauseMovie()">⏸</button>
        </div>

        <!-- RIGHT: Remote video -->
        <div style="width:15%; background:#111;">
            <video id="remoteVideo" autoplay style="width:100%;"></video>
        </div>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
